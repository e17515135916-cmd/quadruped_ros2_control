controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    rail_position_controller:
      type: forward_command_controller/ForwardCommandController

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0

joint_trajectory_controller:
  ros__parameters:
    joints:
      # Leg 1 (Front Left) - 4 actuated joints
      - j11
      - j111
      - j1111
      # Leg 2 (Front Right) - 4 actuated joints
      - j21
      - j211
      - j2111
      # Leg 3 (Rear Left) - 4 actuated joints
      - j31
      - j311
      - j3111
      # Leg 4 (Rear Right) - 4 actuated joints
      - j41
      - j411
      - j4111
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

rail_position_controller:
  ros__parameters:
    joints:
      - j1
      - j2
      - j3
      - j4
    interface_name: position

