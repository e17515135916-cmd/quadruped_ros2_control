# Presentation Visualization System Configuration Template
# This file contains all available configuration options with their default values

# Global style configuration
style:
  color_scheme: "dark_tech"  # Options: dark_tech, light_professional
  background_color: "#2b2b2b"
  primary_color: "#00bcd4"
  secondary_color: "#ff9800"
  font_family: "Arial"
  font_size_title: 16
  font_size_label: 12
  dpi: 300

# Data source configuration
data_sources:
  urdf_path: "src/dog2_description/urdf/dog2.urdf.xacro"
  joint_states_topic: "/joint_states"
  imu_topic: "/imu/data"
  odom_topic: "/odom"

# Output configuration
output:
  directory: "presentation_outputs"
  format: "png"
  preview_enabled: false

# Kinematic diagram configuration
kinematic_diagram:
  view: "side"  # Options: side, top, front
  show_coordinate_frames: true
  joint_labels: true

# Workspace analysis configuration
workspace_analysis:
  leg_id: "FL"  # Options: FL, FR, RL, RR
  rail_extension: 0.1  # meters
  resolution: 100

# ROS graph configuration
ros_graph:
  nodes:
    - name: "Joystick"
      type: "input"
    - name: "MPC Controller"
      type: "core"
    - name: "Gazebo"
      type: "sim"
  connections:
    - from: "Joystick"
      to: "MPC Controller"
      label: "Target Velocity"
    - from: "MPC Controller"
      to: "Gazebo"
      label: "Joint Commands"
    - from: "Gazebo"
      to: "MPC Controller"
      label: "Joint States / IMU"

# FSM visualization configuration
fsm_visualization:
  states:
    - name: "Approach"
      description: "接近障碍"
    - name: "Rail_Extend"
      description: "导轨伸出"
    - name: "Leg_Fold"
      description: "折叠过窗"
    - name: "Recover"
      description: "恢复姿态"
  transitions:
    - from: "Approach"
      to: "Rail_Extend"
    - from: "Rail_Extend"
      to: "Leg_Fold"
    - from: "Leg_Fold"
      to: "Recover"
    - from: "Recover"
      to: "Approach"

# Keyframe extraction configuration
keyframe_extraction:
  timestamps: [0.0, 2.5, 5.0, 7.5]  # seconds
  window_title: "Gazebo"

# Plot generation configuration
plot_generation:
  variables:
    - name: "body_height"
      topic: "/odom"
      field: "pose.pose.position.z"
      ylabel: "Height (m)"
    - name: "joint_angle_FL_hip"
      topic: "/joint_states"
      field: "position[0]"
      ylabel: "Angle (rad)"
