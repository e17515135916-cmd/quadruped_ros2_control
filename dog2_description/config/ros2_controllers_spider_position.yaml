controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Spider startup: revolute joints only, position commands.
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Prismatic rails are controlled independently for easier debugging.
    rail_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 100.0

joint_trajectory_controller:
  ros__parameters:
    joints:
      - lf_haa_joint
      - lf_hfe_joint
      - lf_kfe_joint
      - rf_haa_joint
      - rf_hfe_joint
      - rf_kfe_joint
      - lh_haa_joint
      - lh_hfe_joint
      - lh_kfe_joint
      - rh_haa_joint
      - rh_hfe_joint
      - rh_kfe_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0

rail_position_controller:
  ros__parameters:
    joints:
      - j1
      - j2
      - j3
      - j4
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
