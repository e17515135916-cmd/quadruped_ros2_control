# ⚠️ 必须加在这个最顶端！解决 Gazebo 命名硬编码导致的“假死”问题
dog2_controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # ⚠️ 保持为 JTC，这样你的 Python 大脑可以直接和它对接
    rail_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 100.0

joint_trajectory_controller:
  ros__parameters:
    joints:
      # Left Front leg (lf) - 3 revolute joints
      - lf_coxa_joint
      - lf_femur_joint
      - lf_tibia_joint
      # Left Hind leg (lh) - 3 revolute joints
      - lh_coxa_joint
      - lh_femur_joint
      - lh_tibia_joint
      # Right Hind leg (rh) - 3 revolute joints
      - rh_coxa_joint
      - rh_femur_joint
      - rh_tibia_joint
      # Right Front leg (rf) - 3 revolute joints
      - rf_coxa_joint
      - rf_femur_joint
      - rf_tibia_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 100.0
    action_monitor_rate: 20.0

rail_position_controller:
  ros__parameters:
    joints:
      - lf_rail_joint
      - lh_rail_joint
      - rh_rail_joint
      - rf_rail_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
