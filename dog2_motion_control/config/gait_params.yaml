# 蜘蛛机器人步态参数配置文件
# 
# 此配置文件定义了爬行步态的所有参数和关节限位
# 
# 使用方法：
# ros2 launch dog2_motion_control spider_gazebo_complete.launch.py config_file:=/path/to/gait_params.yaml

# ============================================================================
# 步态参数
# ============================================================================
gait:
  # 爬行步态参数（Crawl Gait）
  stride_length: 0.08      # 步长（米），爬行步态较小以保证稳定性
  stride_height: 0.05      # 步高（米），脚部抬起的最小高度
  cycle_time: 2.0          # 步态周期（秒），爬行步态较慢以保证静态稳定
  duty_factor: 0.75        # 支撑相占比（75%确保至少3条腿着地）
  body_height: 0.2         # 身体高度（米），机身距离地面的高度
  gait_type: "crawl"       # 步态类型：crawl（爬行）或 trot（对角线小跑，未实现）
  
  # 腿部摆动顺序（爬行步态）
  # leg1 (lf) -> leg3 (lh) -> leg2 (rf) -> leg4 (rh)
  leg_sequence: ["leg1", "leg3", "leg2", "leg4"]
  
  # 相位偏移（度）
  # 4条腿均匀分布，相位差90度
  phase_offsets:
    leg1: 0.0      # 前左腿，相位0度
    leg2: 180.0    # 前右腿，相位180度
    leg3: 90.0     # 后左腿，相位90度
    leg4: 270.0    # 后右腿，相位270度

# ============================================================================
# 关节限位
# ============================================================================
joint_limits:
  # 导轨关节限位（米）
  # 当前阶段导轨锁定在0.0米，但仍需定义限位用于安全检查
  rail:
    min: -0.05   # 最小位移：-5cm
    max: 0.05    # 最大位移：+5cm
    locked_position: 0.0  # 锁定位置：0米
    slip_threshold: 0.0005  # 滑动检测阈值：0.5mm
  
  # HAA关节限位（弧度）- Hip Abduction/Adduction
  # 控制腿部的侧向张开/收回
  haa:
    min: -0.785  # -45度
    max: 0.785   # +45度
  
  # HFE关节限位（弧度）- Hip Flexion/Extension
  # 控制大腿的前后摆动
  hfe:
    min: -1.57   # -90度
    max: 1.57    # +90度
  
  # KFE关节限位（弧度）- Knee Flexion/Extension
  # 控制小腿的屈伸
  kfe:
    min: -2.356  # -135度
    max: 0.0     # 0度

# ============================================================================
# 控制参数
# ============================================================================
control:
  frequency: 50.0          # 控制频率（Hz），主控制循环频率
  max_joint_velocity: 2.0  # 最大关节速度（rad/s），用于轨迹规划
  max_joint_acceleration: 5.0  # 最大关节加速度（rad/s²）
  
  # 速度命令缩放因子
  velocity_scale:
    linear_x: 1.0   # 前进/后退速度缩放
    linear_y: 1.0   # 左右平移速度缩放
    angular_z: 1.0  # 旋转速度缩放
  
  # 平滑停止参数
  smooth_stop:
    enabled: true
    deceleration_time: 1.0  # 减速时间（秒）

# ============================================================================
# 稳定性参数
# ============================================================================
stability:
  # 静态稳定性裕度
  com_margin: 0.02         # 质心到支撑三角形边界的最小距离（米）
  max_body_tilt: 0.262     # 最大身体倾斜角度（弧度，15度）
  
  # 支撑三角形验证
  verify_support_triangle: true  # 是否验证支撑三角形
  min_support_legs: 3            # 最少支撑腿数量

# ============================================================================
# 工作空间参数
# ============================================================================
workspace:
  # 脚部工作空间范围（相对于腿部基座，米）
  foot_x_min: -0.35
  foot_x_max: 0.35
  foot_y_min: -0.35
  foot_y_max: 0.35
  foot_z_min: -0.45  # 最低点（向下）
  foot_z_max: -0.05  # 最高点（接近腿部基座）

# ============================================================================
# 错误处理参数
# ============================================================================
error_handling:
  # IK失败处理
  ik_failure:
    use_last_valid: true      # 使用上一个有效配置
    max_consecutive_failures: 5  # 最大连续失败次数
  
  # 关节卡死检测
  joint_stuck:
    detection_enabled: true
    velocity_threshold: 0.01  # 速度阈值（rad/s）
    time_threshold: 2.0       # 时间阈值（秒）
    effort_reduction: 0.5     # 力矩降低因子
  
  # 紧急安全姿态
  emergency_posture:
    enabled: true
    body_height: 0.1          # 安全姿态身体高度（米）
    transition_time: 3.0      # 过渡时间（秒）
    rail_lock_effort: 1.0     # 导轨锁定力矩（最大）

# ============================================================================
# 调试参数
# ============================================================================
debug:
  enabled: false              # 是否启用调试模式
  publish_foot_trajectory: false  # 是否发布脚部轨迹
  publish_support_triangle: false  # 是否发布支撑三角形
  publish_com_projection: false    # 是否发布质心投影
  log_level: "INFO"           # 日志级别：DEBUG, INFO, WARN, ERROR
  
  # 可视化参数
  visualization:
    foot_trajectory_color: [1.0, 0.0, 0.0, 1.0]  # RGBA
    support_triangle_color: [0.0, 1.0, 0.0, 0.5]  # RGBA
    com_projection_color: [0.0, 0.0, 1.0, 1.0]    # RGBA

# ============================================================================
# 腿部几何参数（从URDF提取）
# ============================================================================
leg_geometry:
  # 链长（米）
  l0_rail_range: 0.05      # 导轨移动范围（当前锁定在0）
  l1_haa_to_hfe: 0.055     # HAA关节到HFE关节的距离
  l2_hfe_to_kfe: 0.152     # HFE关节到KFE关节的距离（大腿）
  l3_kfe_to_foot: 0.299    # KFE关节到脚部的距离（小腿）
  
  # 腿部基座位置（相对于base_link，米）
  leg_base_positions:
    leg1: [0.1535, 0.0725, 0.0]   # 前左
    leg2: [0.1535, -0.0725, 0.0]  # 前右
    leg3: [-0.1535, 0.0725, 0.0]  # 后左
    leg4: [-0.1535, -0.0725, 0.0] # 后右
  
  # 腿部坐标系旋转（RPY，弧度）
  leg_base_rotations:
    leg1: [1.5708, 0.0, 0.0]      # 前左：绕X轴旋转90度
    leg2: [1.5708, 0.0, 0.0]      # 前右：绕X轴旋转90度
    leg3: [1.5708, 0.0, -3.1416]  # 后左：绕X轴90度，绕Z轴180度
    leg4: [1.5708, 0.0, -3.1416]  # 后右：绕X轴90度，绕Z轴180度
