# 快速测试步态参数配置文件
# 
# 此配置使用更快的步态周期，用于快速测试和调试
# 
# 使用方法：
# ros2 launch dog2_motion_control spider_gazebo_complete.launch.py \
#   config_file:=$(ros2 pkg prefix dog2_motion_control)/share/dog2_motion_control/config/gait_params_fast.yaml

# 继承默认配置，只覆盖需要修改的参数
gait:
  stride_length: 0.06      # 较小的步长
  stride_height: 0.04      # 较小的步高
  cycle_time: 1.0          # 更快的周期（1秒）
  duty_factor: 0.75        # 保持75%支撑相
  body_height: 0.2
  gait_type: "crawl"

control:
  frequency: 50.0
  max_joint_velocity: 3.0  # 允许更快的关节速度

debug:
  enabled: true            # 启用调试模式
  publish_foot_trajectory: true
  publish_support_triangle: true
  log_level: "DEBUG"
